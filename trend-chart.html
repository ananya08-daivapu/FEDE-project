<!DOCTYPE html>
<html>
<head>
<title>Trend Charts</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url('images/trend.jpg') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:linear-gradient(-45deg,
rgba(15,32,39,0.6),
rgba(32,58,67,0.6),
rgba(44,83,100,0.6),
rgba(28,28,60,0.6));
background-size:400% 400%;
animation:moveBG 8s ease infinite;
}

@keyframes moveBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.page{text-align:center;padding-top:80px;}

.card{
width:500px;
margin:auto;
background:white;
color:black;
padding:30px;
border-radius:20px;
}

.bar{
height:30px;
background:#3498db;
margin:15px 0;
border-radius:10px;
animation:grow 2s infinite alternate;
}

@keyframes grow{
from{width:40%;}
to{width:90%;}
}
</style>
</head>

<body>

<div class="page">

<h1>📈 Trend Charts</h1>

<div class="card">

<p>Heart Rate</p>
<div class="bar"></div>

<p>Blood Pressure</p>
<div class="bar"></div>

<p>Sugar Level</p>
<div class="bar"></div>

</div>

<br>

<a href="doctor-dashboard.html" style="color:white;">⬅ Back to Dashboard</a>

</div>

</body>
</html>
