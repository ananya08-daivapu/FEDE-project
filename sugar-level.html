<!DOCTYPE html>
<html>
<head>
<title>Sugar Level</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:url('images/sugar.jpg') no-repeat center center fixed;
    background-size:cover;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;

    background: linear-gradient(-45deg,
        rgba(66,39,90,0.6),
        rgba(115,75,109,0.6),
        rgba(44,62,80,0.6),
        rgba(28,28,60,0.6)
    );

    background-size:400% 400%;
    animation: moveBG 8s ease infinite;
}

@keyframes moveBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:320px;
    margin:40px auto;
    background:white;
    color:black;
    padding:30px;
    border-radius:15px;
    animation: heartbeat 1.5s ease-in-out infinite;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    50%{transform:scale(1.02);}
    100%{transform:scale(1);}
}

.page{text-align:center;padding-top:80px;}

.value{font-size:40px;font-weight:bold;color:#f39c12;}
</style>
</head>

<body>

<div class="page">
<h1>🧪 Sugar Level</h1>

<div class="card">
<div class="value" id="sugar">--</div>
<div id="status">Checking...</div>
</div>

<a href="patient-dashboard.html">Back</a>
</div>

<script>
function update(){
let s=Math.floor(Math.random()*120+70);
document.getElementById("sugar").innerText=s+" mg/dL";

let st=(s<90)?"Low":(s<=140)?"Normal":"High";
document.getElementById("status").innerText=st;
}
update();
setInterval(update,2000);
</script>

</body>
</html>
