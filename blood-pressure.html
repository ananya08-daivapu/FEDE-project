<!DOCTYPE html>
<html>
<head>
<title>Blood Pressure</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:url('images/bp.jpg') no-repeat center center fixed;
    background-size:cover;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;

    background: linear-gradient(-45deg,
        rgba(20,30,48,0.6),
        rgba(36,59,85,0.6),
        rgba(31,28,44,0.6),
        rgba(44,62,80,0.6)
    );

    background-size:400% 400%;
    animation: moveBG 8s ease infinite;
}

@keyframes moveBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:320px;
    margin:40px auto;
    background:white;
    color:black;
    padding:30px;
    border-radius:15px;
    animation: heartbeat 1.5s ease-in-out infinite;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    50%{transform:scale(1.02);}
    100%{transform:scale(1);}
}

.page{text-align:center;padding-top:80px;}

.value{font-size:40px;font-weight:bold;color:#3498db;}

a{color:#9b59b6;}
</style>
</head>

<body>

<div class="page">
<h1>🩺 Blood Pressure</h1>

<div class="card">
<div class="value" id="bp">--/--</div>
<div id="status">Checking...</div>
</div>

<a href="patient-dashboard.html">Back</a>
</div>

<script>
function update(){
let s=Math.floor(Math.random()*40+90);
let d=Math.floor(Math.random()*30+60);

document.getElementById("bp").innerText=s+"/"+d;

let st=(s<110)?"Low":(s<=130)?"Normal":"High";
document.getElementById("status").innerText=st;
}
update();
setInterval(update,2000);
</script>

</body>
</html>
