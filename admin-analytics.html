<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url('images/admin-analytics.jpg') no-repeat center center fixed;
background-size:cover;
}

.page{
text-align:center;
padding-top:80px;
}

.card{
width:500px;
margin:auto;
background:white;
color:black;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.bar{
height:30px;
background:#3498db;
margin:15px 0;
border-radius:10px;
animation:grow 2s infinite alternate;
}

@keyframes grow{
from{width:40%;}
to{width:90%;}
}
</style>

</head>
<body>

<div class="page">

<h1>📈 Analytics</h1>

<div class="card">

<p>Patient Growth</p>
<div class="bar"></div>

<p>Doctor Activity</p>
<div class="bar"></div>

<p>Revenue Growth</p>
<div class="bar"></div>

<p>Hospital Performance</p>
<div class="bar"></div>

</div>

<br>

<a href="admin-dashboard.html">⬅ Back to Dashboard</a>

</div>

</body>
</html>
