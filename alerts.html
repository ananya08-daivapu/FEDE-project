<!DOCTYPE html>
<html>
<head>
<title>Alerts</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url('images/alerts.jpg') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:rgba(0,0,0,0.6);
}

.page{text-align:center;padding-top:80px;}

.card{
width:500px;
margin:auto;
background:white;
color:black;
padding:30px;
border-radius:20px;
}

.alert{
background:#ffdddd;
padding:15px;
margin:10px 0;
border-radius:10px;
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="page">

<h1>🚨 Alerts</h1>

<div class="card">

<div class="alert">⚠ Sugar Level High</div>
<div class="alert">⚠ Blood Pressure Critical</div>
<div class="alert">⚠ Heart Rate Abnormal</div>

</div>

<br>

<a href="doctor-dashboard.html" style="color:white;">⬅ Back to Dashboard</a>

</div>

</body>
</html>
