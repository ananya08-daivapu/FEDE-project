<!DOCTYPE html>
<html>
<head>
<title>Heart Rate</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:url('images/heart.jpg') no-repeat center center fixed;
    background-size:cover;
}

/* background animation */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    background: linear-gradient(-45deg,
        rgba(15,32,39,0.6),
        rgba(32,58,67,0.6),
        rgba(44,83,100,0.6),
        rgba(28,28,60,0.6)
    );
    background-size:400% 400%;
    animation: moveBG 8s ease infinite;
}

@keyframes moveBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* CENTER FIX */
.page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* CARD */
.card{
    width:320px;
    background:white;
    color:black;
    padding:30px;
    border-radius:15px;
    animation: heartbeat 1.5s ease-in-out infinite;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    margin-top:20px;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.03);}
    50%{transform:scale(1);}
    75%{transform:scale(1.02);}
    100%{transform:scale(1);}
}

/* BPM */
.bpm{
    font-size:40px;
    font-weight:bold;
    color:#e74c3c;
    animation:pulseText 1s infinite;
}

@keyframes pulseText{
    0%{opacity:1;}
    50%{opacity:0.6;}
    100%{opacity:1;}
}

.status{
    margin-top:10px;
    font-size:18px;
}

a{
    margin-top:20px;
    color:#9b59b6;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="page">
    <h1>💓 Heart Rate Monitor</h1>

    <div class="card">
        <div class="bpm" id="bpm">-- BPM</div>
        <div class="status" id="status">Checking...</div>
    </div>

    <a href="patient-dashboard.html">⬅ Back</a>
</div>

<script>
function update(){
    let bpm = Math.floor(Math.random()*(110-60)+60);
    document.getElementById("bpm").innerText = bpm + " BPM";

    let st = (bpm < 70) ? "Low" : (bpm <= 100) ? "Normal" : "High";
    document.getElementById("status").innerText = "Status: " + st;
}

update();
setInterval(update,2000);
</script>

</body>
</html>
