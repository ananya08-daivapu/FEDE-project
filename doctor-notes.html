<!DOCTYPE html>
<html>
<head>
<title>Doctor Notes</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url('images/doctor-notes.jpg') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:linear-gradient(-45deg,
rgba(15,32,39,0.6),
rgba(32,58,67,0.6),
rgba(44,83,100,0.6),
rgba(28,28,60,0.6));
background-size:400% 400%;
animation:moveBG 8s ease infinite;
}

@keyframes moveBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.page{text-align:center;padding-top:80px;}

.card{
width:500px;
margin:auto;
background:white;
color:black;
padding:30px;
border-radius:20px;
animation:heartbeat 1.5s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1);}
50%{transform:scale(1.02);}
100%{transform:scale(1);}
}

textarea{
width:100%;
height:180px;
padding:10px;
}

button{
padding:10px 20px;
margin-top:15px;
background:#9b59b6;
color:white;
border:none;
border-radius:10px;
}

a{color:white;}
</style>
</head>

<body>

<div class="page">

<h1>📝 Doctor Notes</h1>

<div class="card">

<textarea placeholder="Write patient notes here..."></textarea>

<br>

<button>Save Notes</button>

</div>

<br>

<a href="doctor-dashboard.html">⬅ Back to Dashboard</a>

</div>

</body>
</html>
